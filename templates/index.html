<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Recipe AI</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f8fafc, #e2e8f0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #1e293b;
        }

        p {
            color: #64748b;
            font-size: 14px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #cbd5f5;
            outline: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #3b82f6;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 20px;
            text-align: left;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 10px;
            white-space: pre-line;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1> Smart Recipe AI</h1>
        <div> <h3 style="width: 100%; font-size: 12px;">Habiba Monem 60303744 - Dana Alremaihi 60301807</h3></div>
        <p>Enter your ingredients and get a quick recipe idea</p>

        <form method="POST">
            <input type="text" name="ingredients" placeholder="e.g. eggs, cheese, tomato" required>
            <br>
            <button type="submit">Generate Recipe</button>
        </form>

        {% if recipe %}
            <div class="result">
                <h3>Generated Recipe</h3>
                <p>{{ recipe }}</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
